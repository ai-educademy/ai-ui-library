name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Debug auth config
        run: |
          echo "=== npm config ==="
          npm config list
          echo "=== .npmrc files ==="
          cat ~/.npmrc 2>/dev/null || echo "No ~/.npmrc"
          cat .npmrc 2>/dev/null || echo "No ./.npmrc"
          echo "=== ACTIONS_ID_TOKEN_REQUEST_URL ==="
          echo "${ACTIONS_ID_TOKEN_REQUEST_URL:+SET}"
          echo "${ACTIONS_ID_TOKEN_REQUEST_URL:-(NOT SET)}"
      - name: Publish with OIDC Trusted Publishing
        run: npm publish --provenance --access public --loglevel verbose
